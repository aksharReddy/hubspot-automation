name: NirogGyan Client News Brief

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-news-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests fpdf2

      - name: Run news report
        env:
          HUBSPOT_TOKEN:   ${{ secrets.HUBSPOT_TOKEN }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python scripts/news_report.py

      - name: Save seen articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_news.json
          git diff --staged --quiet || git commit -m "Update seen news articles"
          git push
